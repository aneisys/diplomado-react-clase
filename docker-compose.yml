services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diplomado-react-clase
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
